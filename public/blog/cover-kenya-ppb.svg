<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0D3D36"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0A1628" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1.2" fill="#0D9488" opacity="0.18"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Right-side: concentric compliance rings -->
  <circle cx="640" cy="200" r="260" stroke="#0D9488" stroke-width="1" fill="none" opacity="0.08"/>
  <circle cx="640" cy="200" r="200" stroke="#0D9488" stroke-width="1" fill="none" opacity="0.12"/>
  <circle cx="640" cy="200" r="140" stroke="#0D9488" stroke-width="1.5" fill="none" opacity="0.18"/>
  <circle cx="640" cy="200" r="80"  stroke="#0D9488" stroke-width="2"   fill="none" opacity="0.25"/>

  <!-- Medical cross (compliance icon) -->
  <rect x="612" y="148" width="16" height="104" rx="5" fill="#0D9488" opacity="0.55"/>
  <rect x="588" y="172" width="64"  height="16"  rx="5" fill="#0D9488" opacity="0.55"/>

  <!-- Tick / checkmark circle -->
  <circle cx="640" cy="200" r="34" stroke="#0D9488" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M624 200 L636 212 L658 188" stroke="#0D9488" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="400" fill="#0D9488"/>

  <!-- Category chip -->
  <rect x="60" y="104" width="66" height="22" rx="11" fill="#0D9488" opacity="0.25"/>
  <text x="93" y="119" fill="#5EEAD4" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2.5">GUIDE</text>

  <!-- Title -->
  <text x="60" y="162" fill="#F8FAFC" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5">The Definitive Guide to</text>
  <text x="60" y="198" fill="#F8FAFC" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5">Importing to Kenya (PPB)</text>

  <!-- Divider -->
  <line x1="60" y1="222" x2="220" y2="222" stroke="#0D9488" stroke-width="1.5" opacity="0.7"/>

  <!-- Sub-label -->
  <text x="60" y="248" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="13">Regulatory compliance · PPB documentation · Site readiness</text>

  <!-- Kenya flag colour dots -->
  <circle cx="60"  cy="304" r="5" fill="#006600"/>
  <circle cx="76"  cy="304" r="5" fill="#1A1A1A"/>
  <circle cx="92"  cy="304" r="5" fill="#BB0000"/>
  <text x="108" y="309" fill="#64748B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600">PPB Kenya · MedicalEquipment.Africa</text>

  <!-- Right fade overlay -->
  <rect width="800" height="400" fill="url(#fade)"/>
</svg>
