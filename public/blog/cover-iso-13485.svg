<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="65%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1A0A0A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#E2231A" opacity="0.1"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>

  <!-- Large ISO badge background shape -->
  <rect x="480" y="60" width="240" height="280" rx="18" fill="#E2231A" opacity="0.08"/>
  <rect x="480" y="60" width="240" height="280" rx="18" stroke="#E2231A" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- ISO wordmark (large) -->
  <text x="600" y="186" fill="#E2231A" font-family="Arial Black,Arial,Helvetica,sans-serif" font-size="72" font-weight="900" text-anchor="middle" opacity="0.7">ISO</text>

  <!-- Standard number -->
  <text x="600" y="240" fill="#F8FAFC" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="700" text-anchor="middle" opacity="0.85">13485</text>

  <!-- Year -->
  <text x="600" y="270" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="14" text-anchor="middle">Medical Devices · Quality Management</text>

  <!-- Certification badge rings -->
  <circle cx="600" cy="200" r="150" stroke="#E2231A" stroke-width="1" fill="none" opacity="0.1"/>
  <circle cx="600" cy="200" r="110" stroke="#E2231A" stroke-width="1" fill="none" opacity="0.08"/>

  <!-- UK flag inspired accent strip (3 colour bars) -->
  <rect x="490" y="308" width="220" height="4" rx="2" fill="#012169" opacity="0.7"/>
  <rect x="490" y="316" width="220" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>
  <rect x="490" y="324" width="220" height="4" rx="2" fill="#C8102E" opacity="0.7"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="400" fill="#E2231A"/>

  <!-- Category chip -->
  <rect x="60" y="104" width="100" height="22" rx="11" fill="#E2231A" opacity="0.2"/>
  <text x="110" y="119" fill="#FCA5A5" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2">TECHNICAL</text>

  <!-- Title -->
  <text x="60" y="164" fill="#F8FAFC" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="900">The UK Refurbishment</text>
  <text x="60" y="198" fill="#F8FAFC" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="900">Standard Explained</text>

  <!-- Divider -->
  <line x1="60" y1="220" x2="200" y2="220" stroke="#E2231A" stroke-width="1.5" opacity="0.6"/>

  <!-- Sub-label -->
  <text x="60" y="246" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="13">What "Certified Refurbished" actually means</text>
  <text x="60" y="264" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="13">for diagnostic imaging equipment</text>

  <!-- MedEquip attribution -->
  <text x="60" y="350" fill="#475569" font-family="Arial,Helvetica,sans-serif" font-size="12">MedicalEquipment.Africa</text>
</svg>
