<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0A2240"/>
      <stop offset="100%" stop-color="#0D3B6E"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E6FBF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E6FBF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bg)"/>
  <rect width="400" height="200" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#4A90D9" opacity="0.2"/>
  </pattern>
  <rect width="400" height="200" fill="url(#dots)"/>

  <!-- Globe outline (right side) -->
  <circle cx="310" cy="100" r="70" stroke="#1E6FBF" stroke-width="1" fill="none" opacity="0.25"/>
  <circle cx="310" cy="100" r="50" stroke="#1E6FBF" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Latitude lines -->
  <ellipse cx="310" cy="100" rx="70" ry="28" stroke="#1E6FBF" stroke-width="0.8" fill="none" opacity="0.2"/>
  <ellipse cx="310" cy="100" rx="70" ry="55" stroke="#1E6FBF" stroke-width="0.8" fill="none" opacity="0.15"/>
  <!-- Longitude lines -->
  <line x1="310" y1="30" x2="310" y2="170" stroke="#1E6FBF" stroke-width="0.8" opacity="0.2"/>
  <line x1="240" y1="100" x2="380" y2="100" stroke="#1E6FBF" stroke-width="0.8" opacity="0.2"/>

  <!-- Medical cross accent -->
  <rect x="42" y="38" width="5" height="28" rx="2" fill="#C8102E" opacity="0.85"/>
  <rect x="33" y="47" width="23" height="5" rx="2" fill="#C8102E" opacity="0.85"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="#C8102E"/>

  <!-- Company name -->
  <text x="60" y="82" fill="#FFFFFF" font-family="Arial Black,Arial,Helvetica,sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">Global Med</text>
  <text x="60" y="110" fill="#FFFFFF" font-family="Arial Black,Arial,Helvetica,sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">Solutions</text>

  <!-- Tagline -->
  <line x1="60" y1="122" x2="190" y2="122" stroke="#4A90D9" stroke-width="1" opacity="0.6"/>
  <text x="60" y="138" fill="#7EB8F5" font-family="Arial,Helvetica,sans-serif" font-size="10" letter-spacing="1.5">CERTIFIED REFURBISHMENT · USA</text>

  <!-- FDA badge -->
  <rect x="60" y="152" width="48" height="18" rx="9" fill="#C8102E" opacity="0.2"/>
  <text x="84" y="164" fill="#F87171" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">FDA REG.</text>

  <!-- ISO badge -->
  <rect x="116" y="152" width="60" height="18" rx="9" fill="#1E6FBF" opacity="0.2"/>
  <text x="146" y="164" fill="#7EB8F5" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1">ISO 13485</text>
</svg>
