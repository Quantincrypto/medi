<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 160" width="260" height="160">
  <!--
    ISO 13485 Certification Mark
    ISO (International Organization for Standardization) brand colours:
    Primary red: #E2231A  Secondary dark: #333333
    The ISO wordmark uses a distinctive red square with white "ISO" lettering
    followed by the standard number. Layout matches common ISO certification marks.
  -->

  <!-- Red ISO badge square -->
  <rect x="0" y="20" width="90" height="120" rx="6" ry="6" fill="#E2231A"/>

  <!-- "ISO" in white inside badge -->
  <text
    x="45" y="100"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="46"
    text-anchor="middle"
    fill="#FFFFFF"
    letter-spacing="-1">ISO</text>

  <!-- Vertical divider -->
  <rect x="102" y="20" width="3" height="120" fill="#CCCCCC"/>

  <!-- Standard number block -->
  <text
    x="115" y="75"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="42"
    fill="#333333"
    dominant-baseline="auto">13485</text>

  <!-- Year tag -->
  <text
    x="115" y="108"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#555555">: 2016</text>

  <!-- Bottom label -->
  <text
    x="115" y="132"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="13"
    fill="#777777">Medical Devices — QMS</text>
</svg>
