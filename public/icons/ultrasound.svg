<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Machine body -->
  <rect x="4" y="6" width="32" height="30" rx="4" stroke="#0891B2" stroke-width="2.5" fill="#ECFEFF"/>
  <!-- Screen -->
  <rect x="7" y="9" width="26" height="20" rx="2" stroke="#0891B2" stroke-width="1.5" fill="white"/>
  <!-- Scan artefact curves on screen -->
  <path d="M9 14 Q20 12 33 14" stroke="#0891B2" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M9 19 Q20 17 33 19" stroke="#0891B2" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <path d="M9 24 Q20 22 33 24" stroke="#0891B2" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Control row below screen -->
  <line x1="8" y1="31" x2="34" y2="31" stroke="#0891B2" stroke-width="1" opacity="0.5"/>
  <!-- Machine base -->
  <rect x="10" y="36" width="20" height="4" rx="2" stroke="#0891B2" stroke-width="1.5"/>
  <!-- Probe body -->
  <rect x="44" y="6" width="12" height="26" rx="6" stroke="#0891B2" stroke-width="2.5" fill="#ECFEFF"/>
  <!-- Probe tip (flat face) -->
  <path d="M44 32 Q50 40 56 32" stroke="#0891B2" stroke-width="2" fill="#A5F3FC" stroke-linejoin="round"/>
  <!-- Ultrasound waves -->
  <path d="M42 41 Q50 47 58 41" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M40 46 Q50 54 60 46" stroke="#0891B2" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Cord -->
  <path d="M44 18 Q38 26 36 36" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/>
</svg>
