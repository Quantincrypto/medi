<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- C-arm arc (opening to the right) -->
  <path d="M40 8 A26 26 0 0 0 40 56" stroke="#7C3AED" stroke-width="3.5" stroke-linecap="round"/>
  <!-- X-ray source box (top of C) -->
  <rect x="30" y="2" width="20" height="10" rx="2" stroke="#7C3AED" stroke-width="2" fill="#F5F3FF"/>
  <!-- Dotted beam line source to detector -->
  <line x1="40" y1="12" x2="40" y2="52" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5" stroke-linecap="round"/>
  <!-- Flat panel detector (bottom of C) -->
  <rect x="28" y="52" width="24" height="9" rx="2" stroke="#7C3AED" stroke-width="2" fill="#EDE9FE"/>
  <!-- Horizontal arm connecting C to column -->
  <line x1="14" y1="32" x2="40" y2="32" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertical column -->
  <rect x="8" y="18" width="8" height="32" rx="3" stroke="#7C3AED" stroke-width="2" fill="#F5F3FF"/>
  <!-- Base -->
  <rect x="2" y="48" width="24" height="5" rx="2.5" stroke="#7C3AED" stroke-width="2" fill="#F5F3FF"/>
  <!-- Wheels -->
  <circle cx="6" cy="57" r="3.5" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="22" cy="57" r="3.5" stroke="#7C3AED" stroke-width="2"/>
</svg>
