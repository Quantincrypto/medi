<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer gantry housing -->
  <circle cx="32" cy="27" r="22" stroke="#0D9488" stroke-width="2.5" fill="#F0FDFA"/>
  <!-- Bore opening -->
  <circle cx="32" cy="27" r="13" stroke="#0D9488" stroke-width="2" fill="white"/>
  <!-- Rotating detector ring (dashed) -->
  <circle cx="32" cy="27" r="18" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="4.5 3" fill="none"/>
  <!-- X-ray source dot at 12 o'clock -->
  <circle cx="32" cy="8" r="3" fill="#0D9488"/>
  <!-- Patient table -->
  <rect x="18" y="48" width="28" height="5" rx="2.5" stroke="#0D9488" stroke-width="2" fill="#CCFBF1"/>
  <!-- Table legs / support -->
  <line x1="24" y1="53" x2="24" y2="58" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="53" x2="40" y2="58" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
</svg>
